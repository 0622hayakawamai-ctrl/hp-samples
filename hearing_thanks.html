<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ヒアリング送信完了 | 早川まい</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&family=Cormorant+Garamond:wght@400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: #fafaf8; color: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.box { text-align: center; max-width: 520px; background: white; padding: 60px 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
.icon { font-family: 'Cormorant Garamond', serif; font-size: 60px; color: #cc785c; font-style: italic; margin-bottom: 12px; }
.label { font-family: 'Cormorant Garamond', serif; font-size: 12px; letter-spacing: 0.4em; color: #cc785c; font-style: italic; margin-bottom: 16px; }
h1 { font-size: 24px; font-weight: 500; margin-bottom: 16px; letter-spacing: 0.05em; }
p { color: #666; line-height: 2; font-size: 14px; margin-bottom: 12px; }
.steps { margin-top: 32px; padding: 24px; background: #fafaf8; border-radius: 8px; text-align: left; }
.steps-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; letter-spacing: 0.05em; }
.steps ol { list-style-position: inside; font-size: 13px; color: #666; line-height: 2; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">✓</div>
  <div class="label">── THANK YOU ──</div>
  <h1>ヒアリング送信完了</h1>
  <p>この度はご回答ありがとうございます。<br>2〜3営業日以内にメールにてご連絡いたします。</p>
  <div class="steps">
    <div class="steps-title">今後の流れ</div>
    <ol>
      <li>回答内容を元に制作仕様確定</li>
      <li>Day 3〜5: 初稿完成・プレビュー送付</li>
      <li>Day 5〜7: 修正対応</li>
      <li>Day 7: 公開・納品</li>
    </ol>
  </div>
</div>
</body>
</html>
